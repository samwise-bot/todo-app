name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openapi-contract:
    name: OpenAPI Contract
    runs-on: ubuntu-latest
    steps:
      - name: Mark telemetry start
        run: echo "$(date +%s)" > "$RUNNER_TEMP/ci-telemetry-start"

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        id: setup-go
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Regenerate OpenAPI artifact
        run: ./ops/run/generate-openapi.sh

      - name: Fail when docs/openapi/openapi.json is stale
        run: |
          git diff --exit-code -- docs/openapi/openapi.json || {
            echo "docs/openapi/openapi.json is stale. Run ./ops/run/generate-openapi.sh and commit the updated file."
            exit 1
          }

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate OpenAPI schema (OpenAPI 3.0)
        run: ./ops/run/validate-openapi.sh docs/openapi/openapi.json

      - name: Collect CI telemetry
        if: always()
        run: |
          mkdir -p "$RUNNER_TEMP/ci-telemetry"
          python3 ./ops/run/collect-ci-telemetry.py \
            --job-id "${{ github.job }}" \
            --job-name "OpenAPI Contract" \
            --start-epoch-file "$RUNNER_TEMP/ci-telemetry-start" \
            --output-json "$RUNNER_TEMP/ci-telemetry/${{ github.job }}.json" \
            --output-csv "$RUNNER_TEMP/ci-telemetry/${{ github.job }}.csv" \
            --cache setup_go=${{ steps.setup-go.outputs.cache-hit }}

      - name: Upload CI telemetry artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-telemetry-${{ github.job }}
          path: |
            ${{ runner.temp }}/ci-telemetry/${{ github.job }}.json
            ${{ runner.temp }}/ci-telemetry/${{ github.job }}.csv
          if-no-files-found: error
          retention-days: 14

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Mark telemetry start
        run: echo "$(date +%s)" > "$RUNNER_TEMP/ci-telemetry-start"

      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        id: setup-go
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Repro backend tests
        run: ./ops/run/test-backend.sh

      - name: Backend contract drift check
        id: backend-contract-drift
        continue-on-error: true
        run: make test-backend-contracts

      - name: Capture backend contract drift context
        if: steps.backend-contract-drift.outcome == 'failure'
        run: |
          mkdir -p "$RUNNER_TEMP/backend-contract-drift"
          mutation_path="backend/tests/generated_openapi_mutation_contract_test.go"
          read_path="backend/tests/generated_openapi_read_contract_test.go"

          for required_path in "$mutation_path" "$read_path"; do
            if [ ! -f "$required_path" ]; then
              echo "Missing required backend contract artifact: $required_path"
              exit 1
            fi
          done

          {
            echo "Backend contract drift detected."
            echo
            echo "Required generated artifact paths:"
            echo "- $mutation_path"
            echo "- $read_path"
            echo
            git status --short -- "$mutation_path" "$read_path"
            echo
            git --no-pager diff -- "$mutation_path" "$read_path"
          } > "$RUNNER_TEMP/backend-contract-drift/diff-context.txt"

      - name: Upload backend contract drift artifact
        if: steps.backend-contract-drift.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: backend-contract-drift-context
          path: ${{ runner.temp }}/backend-contract-drift/diff-context.txt
          if-no-files-found: error
          retention-days: 14

      - name: Fail when backend contract drift is detected
        if: steps.backend-contract-drift.outcome == 'failure'
        run: |
          echo "Backend contract tests are stale. Run 'make test-backend-contracts' and commit generated changes."
          exit 1

      - name: Collect CI telemetry
        if: always()
        run: |
          mkdir -p "$RUNNER_TEMP/ci-telemetry"
          python3 ./ops/run/collect-ci-telemetry.py \
            --job-id "${{ github.job }}" \
            --job-name "Backend Tests" \
            --start-epoch-file "$RUNNER_TEMP/ci-telemetry-start" \
            --output-json "$RUNNER_TEMP/ci-telemetry/${{ github.job }}.json" \
            --output-csv "$RUNNER_TEMP/ci-telemetry/${{ github.job }}.csv" \
            --cache setup_go=${{ steps.setup-go.outputs.cache-hit }}

      - name: Upload CI telemetry artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-telemetry-${{ github.job }}
          path: |
            ${{ runner.temp }}/ci-telemetry/${{ github.job }}.json
            ${{ runner.temp }}/ci-telemetry/${{ github.job }}.csv
          if-no-files-found: error
          retention-days: 14

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Mark telemetry start
        run: echo "$(date +%s)" > "$RUNNER_TEMP/ci-telemetry-start"

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        id: setup-node
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: ./ops/run/install-frontend-deps.sh
      - name: Vitest
        run: cd frontend && npm test

      - name: Collect CI telemetry
        if: always()
        run: |
          mkdir -p "$RUNNER_TEMP/ci-telemetry"
          python3 ./ops/run/collect-ci-telemetry.py \
            --job-id "${{ github.job }}" \
            --job-name "Frontend Tests" \
            --start-epoch-file "$RUNNER_TEMP/ci-telemetry-start" \
            --output-json "$RUNNER_TEMP/ci-telemetry/${{ github.job }}.json" \
            --output-csv "$RUNNER_TEMP/ci-telemetry/${{ github.job }}.csv" \
            --cache setup_node=${{ steps.setup-node.outputs.cache-hit }}

      - name: Upload CI telemetry artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-telemetry-${{ github.job }}
          path: |
            ${{ runner.temp }}/ci-telemetry/${{ github.job }}.json
            ${{ runner.temp }}/ci-telemetry/${{ github.job }}.csv
          if-no-files-found: error
          retention-days: 14

  browser-smoke:
    name: Browser Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Mark telemetry start
        run: echo "$(date +%s)" > "$RUNNER_TEMP/ci-telemetry-start"

      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        id: setup-go
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        id: setup-node
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: ./ops/run/install-frontend-deps.sh
      - name: Install Chromium for Playwright
        run: cd frontend && npm run test:smoke:install
      - name: Run browser smoke
        run: cd frontend && npm run test:smoke

      - name: Collect CI telemetry
        if: always()
        run: |
          mkdir -p "$RUNNER_TEMP/ci-telemetry"
          python3 ./ops/run/collect-ci-telemetry.py \
            --job-id "${{ github.job }}" \
            --job-name "Browser Smoke" \
            --start-epoch-file "$RUNNER_TEMP/ci-telemetry-start" \
            --output-json "$RUNNER_TEMP/ci-telemetry/${{ github.job }}.json" \
            --output-csv "$RUNNER_TEMP/ci-telemetry/${{ github.job }}.csv" \
            --cache setup_go=${{ steps.setup-go.outputs.cache-hit }} \
            --cache setup_node=${{ steps.setup-node.outputs.cache-hit }}

      - name: Upload CI telemetry artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-telemetry-${{ github.job }}
          path: |
            ${{ runner.temp }}/ci-telemetry/${{ github.job }}.json
            ${{ runner.temp }}/ci-telemetry/${{ github.job }}.csv
          if-no-files-found: error
          retention-days: 14

  ci-telemetry-regression:
    name: CI Telemetry Regression Gate
    runs-on: ubuntu-latest
    needs:
      - openapi-contract
      - backend-test
      - frontend-test
      - browser-smoke
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download job telemetry artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/ci-telemetry/input
          pattern: ci-telemetry-*
          merge-multiple: true

      - name: Check telemetry against thresholds
        id: telemetry-check
        run: |
          mkdir -p "$RUNNER_TEMP/ci-telemetry/output"
          python3 ./ops/run/check-ci-telemetry.py \
            --thresholds ./.github/ci-telemetry-thresholds.json \
            --telemetry-dir "$RUNNER_TEMP/ci-telemetry/input" \
            --output-json "$RUNNER_TEMP/ci-telemetry/output/summary.json" \
            --output-csv "$RUNNER_TEMP/ci-telemetry/output/summary.csv"

      - name: Upload telemetry summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-telemetry-summary
          path: |
            ${{ runner.temp }}/ci-telemetry/output/summary.json
            ${{ runner.temp }}/ci-telemetry/output/summary.csv
          if-no-files-found: error
          retention-days: 14

      - name: Add telemetry regression triage summary
        if: always()
        run: |
          if [ "${{ steps.telemetry-check.outcome }}" = "success" ]; then
            status="PASS"
          else
            status="FAIL"
          fi
          summary_json="$RUNNER_TEMP/ci-telemetry/output/summary.json"
          snippet_file="$RUNNER_TEMP/ci-telemetry/per-job-snippet.md"
          if [ -f "$summary_json" ]; then
            python3 - "$summary_json" > "$snippet_file" <<'PY'
import json
import sys
from pathlib import Path

summary = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
jobs = summary.get("jobs", [])

print("### Per-job at a glance")
print("")
print("| Job | Status | Duration | Regression | Cache misses |")
print("| --- | --- | ---: | ---: | ---: |")
for job in jobs:
    job_id = job.get("job_id", "n/a")
    job_status = str(job.get("status", "n/a")).upper()

    duration_value = job.get("duration_seconds")
    if isinstance(duration_value, (int, float)):
        duration = f"{duration_value:.2f}s"
    else:
        duration = "n/a"

    regression_value = job.get("regression_percent")
    if isinstance(regression_value, (int, float)):
        regression = f"{regression_value:+.1f}%"
    else:
        regression = "n/a"

    cache_misses_value = job.get("cache_miss_count")
    if isinstance(cache_misses_value, int):
        cache_misses = str(cache_misses_value)
    else:
        cache_misses = "n/a"

    print(f"| `{job_id}` | {job_status} | {duration} | {regression} | {cache_misses} |")
PY
          else
            {
              echo "### Per-job at a glance"
              echo ""
              echo "_summary.json not found; see telemetry artifacts for details._"
            } > "$snippet_file"
          fi
          artifacts_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
          {
            echo "## CI Telemetry Regression"
            echo ""
            echo "- Status: **${status}**"
            echo ""
            cat "$snippet_file"
            echo ""
            echo "- Artifacts:"
            echo "  - \`ci-telemetry-openapi-contract\`"
            echo "  - \`ci-telemetry-backend-test\`"
            echo "  - \`ci-telemetry-frontend-test\`"
            echo "  - \`ci-telemetry-browser-smoke\`"
            echo "  - \`ci-telemetry-summary\`"
            echo "- [View artifacts for this run](${artifacts_url})"
          } >> "$GITHUB_STEP_SUMMARY"
